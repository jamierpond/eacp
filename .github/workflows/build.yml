name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Universal Binary
            os: macos-latest
            cmake-flags: '-DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"'
          - name: Linux GCC
            os: ubuntu-latest
            cmake-flags: '-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++'
          - name: Linux Clang
            os: ubuntu-latest
            cmake-flags: '-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++'
          - name: Windows MSVC
            os: windows-latest
            msvc-arch: x64
            cmake-flags: ''
          - name: Windows Clang
            os: windows-latest
            msvc-arch: x64
            cmake-flags: '-DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl'
          - name: Windows MSVC ARM64
            os: windows-11-arm
            msvc-arch: arm64
            cmake-flags: ''
          - name: Windows Clang ARM64
            os: windows-11-arm
            msvc-arch: arm64
            cmake-flags: '-DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl'

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libcurl4-openssl-dev clang

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: egor-tensin/vs-shell@54e4148eac794e4580591c2e0b7750f14b7891fc # v2
        with:
          arch: ${{ matrix.msvc-arch }}

      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug -DEACP_CI_BUILD=ON ${{ matrix.cmake-flags }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  eacp-tidy:
    name: eacp-tidy (CLAUDE.md rules)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug -DEACP_UNITY_BUILD=OFF

      - name: Build
        run: cmake --build build

      - name: Run eacp-tidy
        run: uv run --project ExtraClangRules ExtraClangRules/main.py

  build-ios:
    name: iOS Simulator
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -G Xcode -B build
          -DCMAKE_SYSTEM_NAME=iOS
          -DCMAKE_OSX_SYSROOT=iphonesimulator
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO
          -DEACP_CI_BUILD=ON

      - name: Build
        run: cmake --build build --config Debug -- -sdk iphonesimulator
