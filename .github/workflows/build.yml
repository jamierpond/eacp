name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Universal Binary
            os: macos-latest
            cmake-flags: '-DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"'
          - name: Linux GCC
            os: ubuntu-latest
            cmake-flags: '-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++'
          - name: Linux Clang
            os: ubuntu-latest
            cmake-flags: '-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++'
          - name: Windows MSVC
            os: windows-latest
            msvc-arch: x64
            cmake-flags: ''
          - name: Windows Clang
            os: windows-latest
            msvc-arch: x64
            cmake-flags: '-DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl'
          - name: Windows MSVC ARM64
            os: windows-11-arm
            msvc-arch: arm64
            cmake-flags: ''
          - name: Windows Clang ARM64
            os: windows-11-arm
            msvc-arch: arm64
            cmake-flags: '-DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl'

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libcurl4-openssl-dev clang

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: egor-tensin/vs-shell@54e4148eac794e4580591c2e0b7750f14b7891fc # v2
        with:
          arch: ${{ matrix.msvc-arch }}

      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug -DEACP_CI_BUILD=ON ${{ matrix.cmake-flags }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  eacp-tidy:
    name: eacp-tidy (CLAUDE.md rules)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pinned LLVM
        run: brew install llvm@21

      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug -DEACP_UNITY_BUILD=OFF

      - name: Build (includes the eacp-tidy plugin)
        run: cmake --build build

      - name: Check the fixture still trips every check
        run: >
          ExtraClangRules/bin/eacp-clang-tidy --checks='-*,eacp-*'
          ExtraClangRules/plugin/test/Sample.cpp --
          -std=c++20 -isysroot "$(xcrun --show-sdk-path)"
          2>/dev/null | grep -c "warning:.*eacp-" | grep -qx 18

      - name: Run eacp-tidy
        run: >
          /opt/homebrew/opt/llvm@21/bin/run-clang-tidy
          -clang-tidy-binary "$PWD/ExtraClangRules/bin/eacp-clang-tidy"
          -p build
          -checks='-*,eacp-*'
          -warnings-as-errors='eacp-*'
          -header-filter='.*/(Lib|Apps)/.*'
          -exclude-header-filter='.*/(build|_deps)/.*'
          -quiet
          "$PWD/(Lib|Apps)/.*"

  build-ios:
    name: iOS Simulator
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -G Xcode -B build
          -DCMAKE_SYSTEM_NAME=iOS
          -DCMAKE_OSX_SYSROOT=iphonesimulator
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO
          -DEACP_CI_BUILD=ON

      - name: Build
        run: cmake --build build --config Debug -- -sdk iphonesimulator
