<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>eacp media</title>
    <style>
        :root { color-scheme: dark; }

        body
        {
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
            background: #14141c;
            color: #e6e6f0;
        }

        h1 { font-size: 1.1rem; margin: 0 0 0.25rem; }
        p { color: #9a9ab2; font-size: 0.85rem; margin: 0 0 1.25rem; max-width: 520px; }
        code { color: #b9a9ff; }

        ul { list-style: none; margin: 0; padding: 0; max-width: 520px; }

        li
        {
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.4rem;
            border: 1px solid #2c2c3c;
            border-radius: 8px;
            cursor: grab;          /* the whole row drags out to Finder / a DAW */
        }

        li:hover { background: #1c1c28; }

        #preview { position: fixed; right: 1.5rem; bottom: 1.5rem; z-index: 5; }
        #preview:empty { display: none; }

        #preview > *
        {
            display: block;
            max-width: min(440px, 80vw);
            max-height: 55vh;
            border-radius: 10px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
            background: #000;
        }

        #preview audio { width: min(440px, 80vw); background: none; }
    </style>
</head>
<body>
<h1>🎬 eacp media</h1>
<p>Media in <code>~/Downloads</code>, streamed off disk over a custom <code>media://</code>
   scheme. Click a row to play (the scrubber seeks via byte-range reads — try a big file).
   Drag a row into Finder or a DAW.</p>

<ul id="list"></ul>
<div id="preview"></div>

<script>
    const list = document.getElementById('list');
    const preview = document.getElementById('preview');

    const VIDEO = ['.mp4', '.mov', '.m4v', '.webm'];
    const IMAGE = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.svg'];
    const ext = (name) => name.slice(name.lastIndexOf('.')).toLowerCase();

    // Show a file: pick the right element, point it at the scheme URL. Native
    // <audio>/<video> controls give play + a seekable playhead for free.
    function show(file)
    {
        const tag = VIDEO.includes(ext(file.name)) ? 'video'
                  : IMAGE.includes(ext(file.name)) ? 'img' : 'audio';
        const el = document.createElement(tag);
        el.src = 'media://' + encodeURI(file.path);
        if (tag !== 'img') { el.controls = true; el.autoplay = true; }
        preview.replaceChildren(el);
    }

    // Ask the C++ side for the file list, then wire each row.
    window.eacp.invoke('listFiles').then(({ files }) =>
    {
        files.forEach((file) =>
        {
            const li = document.createElement('li');
            li.textContent = file.name;
            li.onclick = () => show(file);
            li.onmousedown = () => window.eacp.invoke('armFileDrag', { files: [file] });
            list.appendChild(li);
        });
    });
</script>
</body>
</html>
